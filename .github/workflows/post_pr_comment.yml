name: Post PR Comment
# Runs in the base repo context with write access, even for fork PRs.
# Downloads the comment artifact saved by the integration test workflow
# and posts it as a PR comment.
on:
  workflow_run:
    workflows: [tests]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  post-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download comment artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-comment
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Post comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim(), 10);
            const body = fs.readFileSync('comment_body.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
