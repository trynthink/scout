name: integration-tests
on:
  workflow_call:
    inputs:
      enable_profiler:
        description: 'Run with profiler enabled'
        required: false
        type: boolean
        default: false
jobs:
  start-runner:
    name: Start self-hosted EC2 runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ami-0f57c48465f6361a6
          ec2-instance-type: r5a.4xlarge
          subnet-id: subnet-a4b769c3
          security-group-id: sg-06a2ae324a6e68d4d
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "scout-github-runner"},
              {"Key": "billingId", "Value": "210109"},
              {"Key": "org", "Value": "scout"}
            ]

  run-test:
    name: Integration Testing
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.label }}
    timeout-minutes: 600
    outputs:
      has_diff: ${{ steps.compare.outputs.has_diff }}
      has_plot_diff: ${{ steps.compare.outputs.has_plot_diff }}
      changed_plots: ${{ steps.compare.outputs.changed_plots }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" psrecord
      - name: Run and profile workflow
        env:
          ENABLE_PROFILER: ${{ inputs.enable_profiler || (github.ref == 'refs/heads/master') }}
        run: |
          if [[ "$ENABLE_PROFILER" == 'true' ]]; then
            steps=("ecm_prep" "run")
            for step in "${steps[@]}"; do
              psrecord --log memory_log_${step}.txt --include-children --interval 1 "python tests/integration_testing/run_workflow.py --run_step $step --yaml tests/integration_testing/integration_test.yml --with_profiler"
              (echo -e; echo "# Elapsed time,CPU (%),Peak Real (MB),Peak Virtual (MB)"; grep -v "time" memory_log_${step}.txt | sort -k3 -n -r | head -n 1 | column -t | tr -s '[:blank:]' ',') >> results/profile_${step}.csv
              mv memory_log_${step}.txt ./results/
            done
          else
            python tests/integration_testing/run_workflow.py --yaml tests/integration_testing/integration_test.yml
          fi
          rm -rf ./tests/integration_testing/results/*
          mv ./results/* ./tests/integration_testing/results/
          mv ./generated/log_*.txt ./tests/integration_testing/results/ 2>/dev/null
      - name: Compare integration test results
        id: compare
        run: |
          git fetch origin master
          has_diff="false"
          has_plot_diff="false"
          changed_plots=""
          if [[ $(git diff --exit-code origin/master ./tests/integration_testing/results/agg_results.json ./tests/integration_testing/results/ecm_results.json) ]]; then
            has_diff="true"
            mkdir tests/integration_testing/base_results
            git show origin/master:tests/integration_testing/results/agg_results.json > tests/integration_testing/base_results/agg_results.json
            git show origin/master:tests/integration_testing/results/ecm_results.json > tests/integration_testing/base_results/ecm_results.json
            git show origin/master:tests/integration_testing/results/plots/tech_potential/Summary_Data-TP.xlsx > tests/integration_testing/base_results/Summary_Data-TP.xlsx
            git show origin/master:tests/integration_testing/results/plots/max_adopt_potential/Summary_Data-MAP.xlsx > tests/integration_testing/base_results/Summary_Data-MAP.xlsx

            python tests/integration_testing/compare_results.py --base-dir tests/integration_testing/base_results --new-dir tests/integration_testing/results
          fi

          # Check for diffs in plot PDF files
          plot_diffs=$(git diff --name-only origin/master -- 'tests/integration_testing/results/plots/' | grep '\.pdf$' || true)
          if [[ -n "$plot_diffs" ]]; then
            has_plot_diff="true"
            has_diff="true"
            changed_plots="$plot_diffs"
          fi

          echo "has_diff=$has_diff" >> $GITHUB_OUTPUT
          echo "has_plot_diff=$has_plot_diff" >> $GITHUB_OUTPUT
          # Use delimiter for multiline output
          echo "changed_plots<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_plots" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Convert changed plot PDFs to PNGs
        if: steps.compare.outputs.has_plot_diff == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils
          mkdir -p tests/integration_testing/results/plot_images
          while IFS= read -r pdf_file; do
            [[ -z "$pdf_file" ]] && continue
            basename=$(basename "$pdf_file" .pdf)
            dirname=$(dirname "$pdf_file")
            # Create a subfolder structure matching the original
            rel_path=${dirname#tests/integration_testing/results/plots/}
            mkdir -p "tests/integration_testing/results/plot_images/$rel_path"
            pdftoppm -png -r 150 -singlefile "$pdf_file" "tests/integration_testing/results/plot_images/$rel_path/$basename"
          done <<< "${{ steps.compare.outputs.changed_plots }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: ./tests/integration_testing/results/
      - name: Commit test results
        id: commit_results
        run: |
          git add ./tests/integration_testing/results/*.json
          if [[ $(git diff --cached --exit-code) ]]; then
            git add ./tests/integration_testing/results/plots/**/*.pdf
            # Also add PNG images if they exist (for plot diff visualization)
            if [[ -d ./tests/integration_testing/results/plot_images ]]; then
              git add ./tests/integration_testing/results/plot_images/
            fi
            git config --global user.email "github-action@users.noreply.github.com"
            git config --global user.name "GitHub Action"
            git commit -m "Upload results files from CI build"
            echo "Pushing to branch"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}

            # Set status checks to success
            checks=("code-quality-checks" "python-tests (3.10)" "python-tests (3.11)" "python-tests (3.12)" "integration-tests / Integration Testing")
            commit_sha=$(git rev-parse HEAD)
            status_url="https://api.github.com/repos/${{ github.repository }}/statuses/$commit_sha"
            for check in "${checks[@]}"; do
              curl -L \
                -X POST \
                $status_url \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -d '{
                  "state": "success",
                  "context": "'"${check}"'",
                  "target_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }'
            done
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          fi
      - name: Fail if results differ from master
        if: steps.compare.outputs.has_diff == 'true'
        run: |
          echo "::error::Integration test results differ from master. Review the comparison artifacts."
          exit 1

  stop-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-runner # required to get output from the start-runner job
      - run-test # required to wait when the main job is done
    runs-on: ubuntu-latest
    if: ${{ always() }} # required to stop the runner even if the error happened in the previous jobs
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.ec2-instance-id }}

  post-pr-comment:
    name: Post PR Comment
    needs: [run-test, stop-runner]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Download artifacts
        if: needs.run-test.outputs.has_plot_diff == 'true'
        uses: actions/download-artifact@v4
        with:
          name: results
          path: ./results
      - name: Post comment with results summary
        uses: actions/github-script@v7
        env:
          HAS_PLOT_DIFF: ${{ needs.run-test.outputs.has_plot_diff }}
          HEAD_REF: ${{ github.head_ref }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const testResult = '${{ needs.run-test.result }}';
            const hasDiff = '${{ needs.run-test.outputs.has_diff }}';
            const hasPlotDiff = process.env.HAS_PLOT_DIFF;
            const headRef = process.env.HEAD_REF;
            const profilerEnabled = '${{ inputs.enable_profiler }}';
            const statusIcon = testResult === 'success' ? '✅' : (hasDiff === 'true' ? '⚠️' : '❌');

            let body = `## ${statusIcon} Integration Test Results (EC2 Runner)\n\n`;
            body += `| Item | Detail |\n|---|---|\n`;
            body += `| **Status** | ${testResult} |\n`;
            body += `| **Results changed vs master** | ${hasDiff === 'true' ? 'Yes — review comparison artifacts' : 'No'} |\n`;
            body += `| **Profiler** | ${profilerEnabled === 'true' ? 'Enabled' : 'Disabled'} |\n`;
            body += `| **Artifacts & Logs** | [View workflow run](${runUrl}) |\n`;

            // Embed plot images if there are plot diffs
            if (hasPlotDiff === 'true') {
              body += `\n### 📊 Changed Plots\n\n`;
              const plotImagesDir = './results/plot_images';
              if (fs.existsSync(plotImagesDir)) {
                const walkDir = (dir) => {
                  let files = [];
                  for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                    const fullPath = path.join(dir, entry.name);
                    if (entry.isDirectory()) {
                      files = files.concat(walkDir(fullPath));
                    } else if (entry.name.endsWith('.png')) {
                      files.push(fullPath);
                    }
                  }
                  return files;
                };
                const pngFiles = walkDir(plotImagesDir).sort();
                for (const pngFile of pngFiles) {
                  const relPath = path.relative(plotImagesDir, pngFile);
                  const plotName = path.basename(pngFile, '.png');
                  const repoPath = `tests/integration_testing/results/plot_images/${relPath}`;
                  const encodedPath = repoPath.split('/').map(s => encodeURIComponent(s)).join('/');
                  const imageUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${headRef}/${encodedPath}`;
                  const displayName = relPath.endsWith('.png') ? relPath.slice(0, -4) : relPath;
                  body += `<details><summary><b>${displayName}</b></summary>\n\n`;
                  body += `![${plotName}](${imageUrl})\n\n`;
                  body += `</details>\n\n`;
                }
              }
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Integration Test Results (EC2 Runner)')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }